<body>

    <button onclick="testEmailJS()">Test EmailJS</button>
    <div id="result"></div>

    <script>
        function testEmailJS() {
            console.log('Testing EmailJS...');
            
            // Your actual credentials
            const SERVICE_ID = 'service_dgany6p';
            const TEMPLATE_ID = 'template_autoresponse';
            const PUBLIC_KEY = '2Y59riccErQCaMRYT';
            
            const params = {
                to_name: 'Test User',
                to_email: 'harshitkumar94306@gmail.com', // Send to yourself for testing
                subject: 'Test Subject',
                message: 'This is a test message from EmailJS',
                from_name: 'Test Sender'
            };
            
            console.log('Sending with params:', params);
